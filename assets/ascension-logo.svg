<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Ascension Health trinity knot logo -->
  <!-- Three leaf/petal shapes rotated 120° apart, interlocking -->

  <!-- Bottom-left petal (teal) — drawn first (behind) -->
  <path d="M100 72
    C 78 80, 52 102, 52 130
    C 52 148, 64 156, 76 148
    C 88 140, 96 116, 100 100
    C 96 116, 88 140, 76 148"
    fill="none" stroke="#00897B" stroke-width="0"/>
  <path d="M100 72
    Q 70 88, 58 124
    Q 50 150, 76 148
    Q 94 146, 100 100Z"
    fill="#00897B" opacity="0.9"/>

  <!-- Bottom-right petal (blue) — middle layer -->
  <path d="M100 72
    Q 130 88, 142 124
    Q 150 150, 124 148
    Q 106 146, 100 100Z"
    fill="#1E3A8A" opacity="0.9"/>

  <!-- Top petal (magenta/pink) — drawn last (on top) -->
  <path d="M100 100
    Q 84 62, 80 38
    Q 76 10, 100 20
    Q 124 10, 120 38
    Q 116 62, 100 100Z"
    fill="#C2185B" opacity="0.9"/>

  <!-- Overlay pieces to create weave effect -->
  <!-- Teal over blue at bottom center -->
  <path d="M100 100
    Q 96 116, 88 132
    Q 84 140, 88 142
    Q 94 146, 100 132
    Q 100 120, 100 100Z"
    fill="#00897B" opacity="0.9"/>

  <!-- Blue over pink at right -->
  <path d="M100 72
    Q 108 64, 114 50
    Q 118 40, 116 36
    Q 126 56, 132 88
    Q 134 100, 124 96
    Q 112 88, 100 72Z"
    fill="#1E3A8A" opacity="0.9"/>
</svg>
